<h1>याद</h1>

<p>
यादों को याद करने के क्रम में...<br><br>

मैं एक याद बन गया...<br><br>

कुछ बातें करने के क्रम में<br>
कुछ बातें गिर गईं...<br><br>

भूली हुई बात को<br>
भूलने के क्रम में<br>
मैं भूली हुई बात बन गया...<br><br>

जब मेरी सारी यादें<br>
भूली हुई बन जाएँगी...<br><br>

मैं पूरा<br>
भूली हुई याद बन जाऊँगा...
</p>
